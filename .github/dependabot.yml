version: 2

updates:
  # Keep the GitHub Actions referenced by docs-ci.yml current. Catches
  # security updates on actions/checkout, actions/setup-node, etc.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - github-actions
    reviewers:
      - anmolg1997

# Only the github-actions block is active today because the repo has no
# Python or JS manifests yet. T011 extends this file with `pip` (or `uv`),
# `npm`, and `docker` blocks once apps/, packages/, and docker/ land.
# `markdownlint-cli` is invoked via `npx` with a pinned version in the
# docs-ci workflow; Dependabot does not parse inline version strings.
