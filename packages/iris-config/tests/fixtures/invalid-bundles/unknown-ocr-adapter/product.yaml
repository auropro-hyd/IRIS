# Invalid: adapters.ocr is "paddel-ocr" (typo) — triggers Literal validation error
region: in
retention_days: 365

adapters:
  ocr: paddel-ocr
  llm: azure-openai

prompts:
  classify:
    path: prompts/classify.j2
    variables: [taxonomy, ocr_text]
  extract:
    path: prompts/extract.j2
    variables: [fields, ocr_text]
  summarize:
    path: prompts/summarize.j2
    variables: [claim_data]
