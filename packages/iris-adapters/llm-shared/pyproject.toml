[project]
name = "iris-adapter-llm-shared"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "iris-engine",
]

# Internal workspace package. Not published to PyPI.
# Consumed only by iris-adapter-llm-azure-openai, iris-adapter-llm-openai, and iris-adapter-llm-local.

[tool.uv.sources]
iris-engine = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iris_adapter_llm_shared"]
