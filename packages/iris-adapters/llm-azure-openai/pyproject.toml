[project]
name = "iris-llm-azure-openai"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "iris-llm-shared",
    "iris-engine",
]

[tool.uv.sources]
iris-llm-shared = { workspace = true }
iris-engine = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iris_adapter_llm_azure_openai"]
