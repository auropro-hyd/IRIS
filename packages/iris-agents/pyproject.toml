[project]
name = "iris-agents"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "iris-engine",
]

[tool.uv.sources]
iris-engine = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iris_agents"]
