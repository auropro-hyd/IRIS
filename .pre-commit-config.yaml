# Pre-commit hooks for IRIS (auropro-hyd/IRIS).
#
# T012 extends this file with Python lint / type-check / secret-scan hooks
# now that apps/ and packages/ have landed. The markdownlint and
# tasks-structural-check hooks from before T012 are retained.
#
# Install hooks after cloning:
#
#     make pre-commit-install
#
# Run against all files manually:
#
#     pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.drawio$
      - id: end-of-file-fixer
        exclude: \.drawio$
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-PyYAML]
        files: '^(packages/iris-engine|packages/iris-adapters)/.*\.py$'
        args: [--strict]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.0
    hooks:
      - id: pyupgrade
        args: [--py312-plus]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        files: \.md$
        args: ["--config", ".markdownlint.json"]

  - repo: local
    hooks:
      - id: tasks-structural-check
        name: tasks structural check
        description: Asserts every workstream folder has spec/plan/tasks and every tasks.md has at least one T0xx line.
        entry: python3 scripts/check-tasks.py
        language: system
        files: ^tasks/
        pass_filenames: false
